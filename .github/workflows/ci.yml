name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    services:
      # Postgres service for the integration tests in tests/integration/.
      # Tests gate on LATTICE_TEST_PG_URL so they skip on local SQLite-only
      # contributors, but always run in CI.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lattice
          POSTGRES_PASSWORD: lattice
          POSTGRES_DB: lattice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lattice -d lattice_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      LATTICE_TEST_PG_URL: postgres://lattice:lattice@localhost:5432/lattice_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verify ESM import
        run: node -e "import('./dist/index.js').then(m => { if (!m.Lattice) throw new Error('ESM export missing'); console.log('ESM OK'); })"

      - name: Verify CJS require
        run: node -e "const m = require('./dist/index.cjs'); if (!m.Lattice) throw new Error('CJS export missing'); console.log('CJS OK');"
