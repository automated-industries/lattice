name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Release trains are integration branches — PRs into them need the same
    # gate as PRs into main.
    branches: [main, 'release/**']

jobs:
  # Full quality gate on Linux, with a real Postgres so the integration tests
  # that gate on LATTICE_TEST_PG_URL actually run. Lint + format + coverage
  # live here only (platform-independent — no need to duplicate on Windows).
  linux:
    name: Lint, typecheck, test, build (ubuntu + postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector image so the native indexed-vector path (CREATE EXTENSION vector
        # + HNSW) is actually exercised by the integration suite, not just skipped.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lattice
          POSTGRES_PASSWORD: lattice
          POSTGRES_DB: lattice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lattice -d lattice_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      LATTICE_TEST_PG_URL: postgres://lattice:lattice@localhost:5432/lattice_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Leak scan (generic public-repo guard)
        run: npm run check:generic

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      # Retrieval-quality regression gate (required). Evaluates the real search()
      # over the golden corpus and fails if any metric drops past tolerance below
      # the committed baseline. The committed baseline is sub-perfect, so a real
      # regression — not just a catastrophic break — trips this.
      - name: Retrieval-quality gate
        run: npm run eval:gate

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # Verify the packaged index re-exports the full managed-cloud API surface a
      # multi-tenant deployment consumes (not just Lattice) — a dropped re-export
      # is a silent downstream break. Kept in sync with the export-contract test.
      - name: Verify ESM import
        run: node -e "import('./dist/index.js').then(m => { for (const s of ['Lattice','registerNativeEntities','secureCloud','memberGroupFor']) if (!m[s]) throw new Error('ESM export missing '+s); console.log('ESM OK'); })"

      - name: Verify CJS require
        run: node -e "const m = require('./dist/index.cjs'); for (const s of ['Lattice','registerNativeEntities','secureCloud','memberGroupFor']) if (!m[s]) throw new Error('CJS export missing '+s); console.log('CJS OK');"

  # Windows leg: no Postgres (GitHub service containers are Linux-only), so the
  # PG-gated integration tests skip and the SQLite suite runs. This is what
  # catches Windows-only regressions like the mkdir-on-postgres-URL crash and
  # the import.meta.url version read.
  windows:
    name: Typecheck, test, build (windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verify ESM import
        run: node -e "import('./dist/index.js').then(m => { for (const s of ['Lattice','registerNativeEntities','secureCloud','memberGroupFor']) if (!m[s]) throw new Error('ESM export missing '+s); console.log('ESM OK'); })"

      - name: Verify CJS require
        run: node -e "const m = require('./dist/index.cjs'); for (const s of ['Lattice','registerNativeEntities','secureCloud','memberGroupFor']) if (!m[s]) throw new Error('CJS export missing '+s); console.log('CJS OK');"

  # ADVISORY latency SLO gate. Runs the real benchmark and checks observed p95s
  # against committed thresholds. NEVER build-blocking — shared GitHub runners are
  # too latency-noisy to gate a merge on — so `continue-on-error: true` reports a
  # violation without failing the workflow. The numbers it prints are measured,
  # not fabricated; the thresholds carry generous headroom (see the fixture).
  slo:
    name: Latency SLO gate (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Advisory SLO gate
        run: npm run slo:gate

  # Browser-level frontend tests for the `lattice gui` SPA. Separate job so it
  # runs in parallel with the unit/typecheck jobs rather than blocking them.
  e2e:
    name: Playwright e2e (chromium)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
