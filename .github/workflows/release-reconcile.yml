name: Release reconcile

# Scheduled safety net for the two release channels. A silent desktop-channel outage
# (a failed Desktop Release that left releases/latest pinned to an older manifest) is
# otherwise indistinguishable from "everything is up to date" — checkManifestForUpdate is
# fail-soft by design. This job compares the npm `latest` dist-tag against the published
# desktop manifest and files an issue when they disagree, so a divergence surfaces within
# the poll window instead of being discovered by a confused user.

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 min
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read # to see whether a release workflow is in flight (publish-window guard)
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const readJson = async (url) => {
              const r = await fetch(url);
              if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
              return r.json();
            };
            let npmLatest = '';
            let manifestVersion = '';
            try {
              const meta = await readJson('https://registry.npmjs.org/latticesql');
              npmLatest = (meta['dist-tags'] && meta['dist-tags'].latest) || '';
            } catch (e) {
              core.warning(`could not read npm: ${e.message}`);
              return; // a transient registry blip is not a divergence
            }
            try {
              const manifest = await readJson(
                `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/latest/download/latest.json`,
              );
              manifestVersion = manifest.version || '';
            } catch (e) {
              core.warning(`could not read desktop manifest: ${e.message}`);
              return;
            }
            core.info(`npm latest=${npmLatest} desktop manifest=${manifestVersion}`);

            const openDivergenceIssues = async () =>
              (
                await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  labels: 'release-divergence',
                })
              ).data;

            // Converged (or unreadable): close any stale divergence issue so a transient
            // alert doesn't linger forever after the channels caught up.
            if (!npmLatest || !manifestVersion || npmLatest === manifestVersion) {
              for (const issue of await openDivergenceIssues()) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Channels re-converged (npm \`${npmLatest}\` = desktop \`${manifestVersion}\`). Closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
              return;
            }

            // Divergent — but the coupling makes the desktop manifest advance FIRST on
            // every healthy release, so there is a normal multi-minute window where
            // desktop is ahead of npm while the publish job runs. Don't cry wolf during
            // it: skip when a release workflow is in flight or just finished.
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 30,
            });
            const RELEASE_WORKFLOWS = ['Release', 'Desktop Release'];
            const recentlyActive = runs.data.workflow_runs.some((r) => {
              if (!RELEASE_WORKFLOWS.includes(r.name || '')) return false;
              if (r.status === 'in_progress' || r.status === 'queued') return true;
              const finished = r.updated_at ? Date.parse(r.updated_at) : 0;
              return finished > 0 && Date.now() - finished < 30 * 60 * 1000;
            });
            if (recentlyActive) {
              core.info('a release is in flight or just finished — treating the gap as the normal publish window');
              return;
            }

            // Avoid duplicate noise: only open an issue if there isn't already an open
            // reconcile issue for this exact pair.
            const marker = `reconcile:${npmLatest}:${manifestVersion}`;
            if ((await openDivergenceIssues()).some((i) => (i.body || '').includes(marker))) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release channels diverged: npm ${npmLatest} vs desktop ${manifestVersion}`,
              body:
                `The npm \`latest\` dist-tag (**${npmLatest}**) and the desktop auto-update manifest ` +
                `(**${manifestVersion}**) do not match. A desktop client and an npm-supervised install ` +
                `are on different versions — likely a failed or partial Desktop Release.\n\n` +
                `<!-- ${marker} -->`,
              labels: ['release-divergence'],
            });
