# Desktop-specific CI: runs the node:sqlite adapter tests under Deno (the main
# CI's Node is too old for node:sqlite) and checks the desktop version stays in
# sync with package.json. Scoped to PRs that touch the desktop build or db layer.
name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/db/**'
      - 'src/desktop-entry.ts'
      - 'tests/deno/**'
      - 'deno.json'
      - 'scripts/sync-desktop-version.mjs'
      - 'scripts/gen-desktop-manifest.mjs'
      - '.github/workflows/desktop-ci.yml'

jobs:
  deno-adapter-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: canary
      - run: npm ci
      - run: npm run desktop:version:check # deno.json version == package.json version
      - run: npm run build # the deno tests import the built dist
      - run: npm run test:deno
