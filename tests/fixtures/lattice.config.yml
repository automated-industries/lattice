db: ./data/lattice-demo.db

entities:
  people:
    fields:
      id: { type: uuid, primaryKey: true }
      name: { type: text, required: true }
      email: { type: text }
      role: { type: text }
      deleted_at: { type: text }
    outputFile: PEOPLE.md

  meetings:
    fields:
      id: { type: uuid, primaryKey: true }
      title: { type: text, required: true }
      starts_at: { type: text }
      transcript: { type: text }
      summary: { type: text }
      deleted_at: { type: text }
    outputFile: MEETINGS.md

  messages:
    fields:
      id: { type: uuid, primaryKey: true }
      channel: { type: text }
      body: { type: text }
      sent_at: { type: text }
      deleted_at: { type: text }
    outputFile: MESSAGES.md

  projects:
    fields:
      id: { type: uuid, primaryKey: true }
      name: { type: text, required: true }
      status: { type: text }
      deleted_at: { type: text }
    outputFile: PROJECTS.md

  repositories:
    fields:
      id: { type: uuid, primaryKey: true }
      url: { type: text, required: true }
      project_id: { type: uuid, ref: projects }
      deleted_at: { type: text }
    outputFile: REPOS.md

  # `files` and `secrets` are framework-native entities registered by the
  # GUI server on every Lattice open (see src/framework/native-entities.ts).
  # They are intentionally NOT declared here so the YAML reflects only
  # the user's domain schema; the native shape is a superset of the
  # earlier fixture shape, so existing seeds + tests keep working.

  # Junction tables (hidden from sidebar/dashboard by the GUI; editable via Data Model).
  meeting_people:
    fields:
      id: { type: uuid, primaryKey: true }
      meeting_id: { type: uuid, ref: meetings }
      person_id: { type: uuid, ref: people }

  meeting_projects:
    fields:
      id: { type: uuid, primaryKey: true }
      meeting_id: { type: uuid, ref: meetings }
      project_id: { type: uuid, ref: projects }

  project_people:
    fields:
      id: { type: uuid, primaryKey: true }
      project_id: { type: uuid, ref: projects }
      person_id: { type: uuid, ref: people }

  message_people:
    fields:
      id: { type: uuid, primaryKey: true }
      message_id: { type: uuid, ref: messages }
      person_id: { type: uuid, ref: people }

  project_files:
    fields:
      id: { type: uuid, primaryKey: true }
      project_id: { type: uuid, ref: projects }
      file_id: { type: uuid, ref: files }
  Invoices:
    fields:
      id:
        type: uuid
        primaryKey: true
      name:
        type: text
        required: true
      deleted_at:
        type: text
    outputFile: INVOICES.md

# Per-row rendered context files. Each row is written to:
#   ./context/<directoryRoot>/<id>/<FILE>.md
# The GUI detail view reads them via /api/tables/:table/rows/:id/context.
entityContexts:
  people:
    slug: '{{id}}'
    directoryRoot: people
    files:
      PERSON.md:
        source: self
        template: default-detail
  meetings:
    slug: '{{id}}'
    directoryRoot: meetings
    files:
      MEETING.md:
        source: self
        template: default-detail
  messages:
    slug: '{{id}}'
    directoryRoot: messages
    files:
      MESSAGE.md:
        source: self
        template: default-detail
  projects:
    slug: '{{id}}'
    directoryRoot: projects
    files:
      PROJECT.md:
        source: self
        template: default-detail
  repositories:
    slug: '{{id}}'
    directoryRoot: repositories
    files:
      REPOSITORY.md:
        source: self
        template: default-detail
  # Native `files` and `secrets` entities are framework-shipped without
  # entity contexts in v1; rendering for them comes from src/framework/
  # native-entities.ts (currently render-suppressed; full templates are a
  # follow-up).
